<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFM — Farm Management</title>
  <link rel="stylesheet" href="/css/design-system.css?v=1783290066771">
  <script>window.__CFM_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xdmZ1cXZpbmRzZ25vZ2VqYWVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTAwMTIsImV4cCI6MjA5NjUyNjAxMn0.EFeaUoz_yXOA34j4yR1LxaD-3755PejUt7qPxVccW7Y';</script>
</head>
<body>

<!-- Login page -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/assets/logo-white.png" alt="CFM" onerror="this.style.display='none'">
      <p class="subtitle">Farm Management System</p>
    </div>
    <div id="login-error" class="hidden" style="background:#fef0ee;color:#a02020;padding:10px 14px;border-radius:6px;font-size:var(--text-sm);margin-bottom:14px;border:1px solid #fcd5d0"></div>
    <div class="form-group">
      <label class="form-label" for="login-email">Email</label>
      <input class="form-input" type="email" id="login-email" autocomplete="username" placeholder="you@station.com.au">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label" for="login-password">Password</label>
      <input class="form-input" type="password" id="login-password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-lg" id="btn-login" style="width:100%;justify-content:center">
      Sign in
    </button>
  </div>
</div>

<!-- App shell -->
<div id="app" class="hidden">

  <header id="topbar">
    <img class="cfm-logo" src="/assets/logo-icon.png" alt="CFM" onerror="this.style.display='none'">
    <span class="cfm-wordmark">CFM <span>Farm Management</span></span>
    <div id="farm-selector" style="display:flex;align-items:center;gap:8px">
      <div style="display:flex;align-items:center;gap:6px">
        <select id="farm-select" aria-label="Active farm"></select>
        <select id="season-select" aria-label="Active season" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;border-radius:6px;padding:4px 8px;font-size:13px"></select>
        <button id="btn-farm-settings" title="Farm settings"
          style="background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);border-radius:var(--radius-sm);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px;transition:background 120ms ease">
          ✏️
        </button>
      </div>
    </div>
    <div id="xero-status-indicator" title="Xero connection status" style="display:none;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:20px;cursor:pointer" onclick="window.location.hash='settings'"></div>
    <div class="user-info" id="user-info-display"></div>
    <button class="btn" id="btn-logout" style="margin-left:8px;background:transparent;border-color:rgba(255,255,255,0.18);color:rgba(255,255,255,0.5);font-size:var(--text-xs)">Sign out</button>
  </header>

  <aside id="sidebar">
    <nav aria-label="Main navigation">
      <p class="nav-section-label">Farm</p>
      <a href="#" data-module="outputs" class="active">
        <span class="nav-icon">📦</span> Outputs
      </a>
      <a href="#" data-module="inputs">
        <span class="nav-icon">🌿</span> Inputs
      </a>
      <a href="#" data-module="budget">
        <span class="nav-icon">📋</span> Data Entry
      </a>
      <a href="#" data-module="gross-margin">
        <span class="nav-icon">📊</span> Gross margin
      </a>
      <p class="nav-section-label" style="margin-top:8px">Operations</p>
      <a href="#" data-module="agronomy">
        <span class="nav-icon">🗺</span> Agronomy
      </a>
      <a href="#" data-module="weather">
        <span class="nav-icon">🌦</span> Weather
      </a>
      <p class="nav-section-label" style="margin-top:8px">System</p>
      <a href="#" data-module="settings">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </nav>
  </aside>

  <main id="main" role="main"></main>

  <!-- Mobile bottom navigation -->
  <nav id="mobile-nav" aria-label="Mobile navigation">
    <a href="#" data-module="outputs" class="active">
      <span class="mob-icon">📦</span>
      Outputs
    </a>
    <a href="#" data-module="budget">
      <span class="mob-icon">📋</span>
      Data Entry
    </a>
    <a href="#" data-module="settings">
      <span class="mob-icon">⚙️</span>
      Settings
    </a>
    <button id="mobile-more-btn" aria-label="More navigation options">
      <span class="mob-icon">☰</span>
      More
    </button>
  </nav>

  <!-- Mobile drawer for extra nav items -->
  <div id="mobile-drawer-overlay"></div>
  <div id="mobile-drawer">
    <a href="#" data-module="inputs"><span>🌿</span> Inputs</a>
    <a href="#" data-module="gross-margin"><span>📊</span> Gross margin</a>
    <a href="#" data-module="agronomy"><span>🗺</span> Agronomy</a>
    <a href="#" data-module="weather"><span>🌦</span> Weather</a>
  </div>

</div>

<script type="module" src="/js/main.js?v=1783290066771"></script>
</body>
</html>
