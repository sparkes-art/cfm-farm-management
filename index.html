<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFM — Farm Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/design-system.css">
  <!-- Supabase anon key (public — safe to expose) -->
  <script>window.__CFM_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xdmZ1cXZpbmRzZ25vZ2VqYWVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTAwMTIsImV4cCI6MjA5NjUyNjAxMn0.EFeaUoz_yXOA34j4yR1LxaD-3755PejUt7qPxVccW7Y';</script>
</head>
<body>

<!-- ── Login page ──────────────────────────────────────────── -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-mark">🌾</span>
      <h1>CFM</h1>
      <p class="subtitle">Farm Management System</p>
    </div>
    <div id="login-error" class="hidden" style="background:#FEE2E2;color:#991B1B;padding:10px 14px;border-radius:6px;font-size:var(--text-sm);margin-bottom:14px;"></div>
    <div class="form-group">
      <label class="form-label" for="login-email">Email</label>
      <input class="form-input" type="email" id="login-email" autocomplete="username" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label" for="login-password">Password</label>
      <input class="form-input" type="password" id="login-password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="btn-login" style="width:100%;justify-content:center;margin-top:8px">
      Sign in
    </button>
  </div>
</div>

<!-- ── App shell (hidden until authenticated) ──────────────── -->
<div id="app" class="hidden">

  <!-- Top bar -->
  <header id="topbar">
    <div class="wordmark">CF<span>M</span></div>

    <div id="farm-selector">
      <select id="farm-select" aria-label="Active farm"></select>
    </div>

    <div class="user-info" id="user-info-display"></div>
    <button class="btn" id="btn-logout" style="margin-left:12px">Sign out</button>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar">
    <nav aria-label="Main navigation">
      <p class="nav-section-label">Farm</p>
      <a href="#" data-module="outputs" class="active">
        <span class="nav-icon">📦</span> Outputs
      </a>
      <a href="#" data-module="inputs">
        <span class="nav-icon">🌿</span> Inputs
      </a>
      <a href="#" data-module="budget">
        <span class="nav-icon">📋</span> Budget
      </a>
      <a href="#" data-module="gross-margin">
        <span class="nav-icon">📊</span> Gross Margin
      </a>

      <p class="nav-section-label" style="margin-top:8px">Operations</p>
      <a href="#" data-module="agronomy">
        <span class="nav-icon">🗺</span> Agronomy
      </a>
      <a href="#" data-module="weather">
        <span class="nav-icon">🌦</span> Weather
      </a>

      <p class="nav-section-label" style="margin-top:8px">System</p>
      <a href="#" data-module="settings">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <main id="main" role="main"></main>

</div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
