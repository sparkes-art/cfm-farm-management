<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFM — Farm Management</title>
  <link rel="stylesheet" href="/css/design-system.css">

</head>
<body>

<!-- Login page -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/assets/logo-white.png" alt="CFM" onerror="this.style.display='none'">
      <p class="subtitle">Farm Management System</p>
    </div>
    <div id="login-error" class="hidden" style="background:#fef0ee;color:#a02020;padding:10px 14px;border-radius:6px;font-size:var(--text-sm);margin-bottom:14px;border:1px solid #fcd5d0"></div>
    <div class="form-group">
      <label class="form-label" for="login-email">Email</label>
      <input class="form-input" type="email" id="login-email" autocomplete="username" placeholder="you@station.com.au">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label" for="login-password">Password</label>
      <input class="form-input" type="password" id="login-password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-lg" id="btn-login" style="width:100%;justify-content:center">
      Sign in
    </button>
  </div>
</div>

<!-- App shell -->
<div id="app" class="hidden">

  <header id="topbar">
    <img class="cfm-logo" src="/assets/logo-white.png" alt="CFM Farm Management">
    <div id="farm-selector">
      <select id="farm-select" aria-label="Active farm"></select>
    </div>
    <div class="user-info" id="user-info-display"></div>
    <button class="btn" id="btn-logout" style="margin-left:8px;background:transparent;border-color:rgba(255,255,255,0.18);color:rgba(255,255,255,0.5);font-size:var(--text-xs)">Sign out</button>
  </header>

  <aside id="sidebar">
    <nav aria-label="Main navigation">
      <p class="nav-section-label">Farm</p>
      <a href="#" data-module="outputs" class="active">
        <span class="nav-icon">📦</span> Outputs
      </a>
      <a href="#" data-module="inputs">
        <span class="nav-icon">🌿</span> Inputs
      </a>
      <a href="#" data-module="budget">
        <span class="nav-icon">📋</span> Budget
      </a>
      <a href="#" data-module="gross-margin">
        <span class="nav-icon">📊</span> Gross margin
      </a>
      <p class="nav-section-label" style="margin-top:8px">Operations</p>
      <a href="#" data-module="agronomy">
        <span class="nav-icon">🗺</span> Agronomy
      </a>
      <a href="#" data-module="weather">
        <span class="nav-icon">🌦</span> Weather
      </a>
      <p class="nav-section-label" style="margin-top:8px">System</p>
      <a href="#" data-module="settings">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </nav>
  </aside>

  <main id="main" role="main"></main>

</div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
